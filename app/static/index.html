<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Chat Hub</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #1a1a2e;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        #chat-container {
            width: 80%;
            max-width: 800px;
            height: 70vh;
            background: #16213e;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        #messages {
            flex-grow: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            padding: 12px 18px;
            border-radius: 8px;
            max-width: 80%;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .user {
            background-color: #0f3460;
            align-self: flex-end;
            border-bottom-right-radius: 0;
        }

        .agent {
            background-color: #e94560;
            align-self: flex-start;
            border-bottom-left-radius: 0;
        }

        .system {
            background-color: #555;
            align-self: center;
            font-style: italic;
            font-size: 0.9em;
            text-align: center;
        }

        #input-area {
            display: flex;
            padding: 15px;
            background: #0f3460;
            border-bottom-left-radius: 12px;
            border-bottom-right-radius: 12px;
        }

        #topic-input {
            flex-grow: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            outline: none;
            font-size: 16px;
            background: #fff;
            color: #333;
        }

        #send-btn {
            background: #e94560;
            color: #fff;
            border: none;
            padding: 0 20px;
            margin-left: 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background 0.3s;
        }

        #send-btn:hover {
            background: #ff5277;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #e94560;
            border-radius: 4px;
        }
    </style>
</head>

<body>
    <h1>Multi-Agent Hub</h1>
    <div id="chat-container">
        <div id="messages"></div>
        <div id="input-area">
            <input type="text" id="topic-input" placeholder="Start a conversation or ask a question...">
            <button id="send-btn">Send</button>
        </div>
    </div>

    <script>
        const messagesDiv = document.getElementById('messages');
        const topicInput = document.getElementById('topic-input');
        const sendBtn = document.getElementById('send-btn');
        let knownMessages = new Set(); // to avoid duplicates if polling

        async function fetchHistory() {
            try {
                const res = await fetch('/api/history');
                const data = await res.json();
                const isAtBottom = messagesDiv.scrollHeight - messagesDiv.scrollTop <= messagesDiv.clientHeight + 20;
                let addedNew = false;

                data.history.forEach(msg => {
                    if (!knownMessages.has(msg)) {
                        appendMessage(msg);
                        addedNew = true;
                    }
                });

                // Auto-scroll only if we added new messages and the user was already at the bottom
                if (addedNew && isAtBottom) {
                    messagesDiv.scrollTop = messagesDiv.scrollHeight;
                }
            } catch (e) {
                console.error("Failed to fetch history:", e);
            }
        }

        function appendMessage(msgString) {
            if (knownMessages.has(msgString)) return;
            knownMessages.add(msgString);

            const div = document.createElement('div');
            div.className = 'message';

            if (msgString.startsWith("[User]")) {
                div.classList.add('user');
                div.textContent = msgString.replace("[User] ", "");
            } else if (msgString.includes("[Bob]") || msgString.includes("[Alice]") || msgString.includes("[Coordinator]")) {
                div.classList.add('agent');
                // Make name bold
                const match = msgString.match(/^\[(.*?)\] (.*)/s);
                if (match) {
                    div.innerHTML = `<strong>${match[1]}:</strong> ${match[2]}`;
                } else {
                    div.textContent = msgString;
                }
            } else {
                div.classList.add('system');
                div.textContent = msgString;
            }

            messagesDiv.appendChild(div);
        }

        async function sendMessage() {
            const topic = topicInput.value.trim();
            if (!topic) return;

            topicInput.value = '';
            // Optimistically add
            appendMessage(`[User] ${topic}`);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;

            try {
                await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: topic })
                });
            } catch (e) {
                console.error("Failed to send message:", e);
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        topicInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        // Poll history every 2 seconds
        setInterval(fetchHistory, 2000);
        fetchHistory();
    </script>
</body>

</html>
